# Terms:

# Directive = a configuration instruction.
# Examples: worker_processes OR listen OR proxy_pass

# Context = a configuration block that groups related directives.
# Examples: events { } OR http { }


# Controls how many worker processes Nginx creates.
# worker_processes number | auto;

# Each worker handles many client connections asynchronously 
# and Independently using a single event loop.

# Nginx does NOT create a new process or thread for every incoming request.
# More workers generally allow better CPU utilization on multi-core systems.

# number = no of worker to make
# should be propertional to no. of cpu cores avaible

# we can set it to auto :
# nginx will automatically decide how many to use , according to no. of avaible cpu cores
worker_processes 1;

# we can define how many connection each worker can handle using context event block
events {
    # it can handle up to 1024 simultaneous client connections.
    worker_connections 1024;
    # Maximum number of simultaneous client connections
    # a single worker process can handle.
    # Higher values allow more concurrent clients but require additional memory.
}

# Now we can define how nginx will handle connection and what to do with it using http directive
http { 

    # we need to pass on types of file in reponse to client
    # such as text/html OR application/javascript OR image/jpeg
    include mime.types;

    # Defining upstream for proxy pass

    # Define a group of backend servers.
    # Nginx forwards requests to this group using the configured load balancing algorithm.

    # The upstream block only defines backend servers.
    # Requests are sent to this group only when `proxy_pass` references the upstream name.
    upstream nodejs_cluster {

        # we can also define which algorithm nginx should use to assign request to which server
        # by default it uses round-robin (goes by order), we can changle that

        # least connection - send request to server which currently has least active connection
        least_conn; 

        # address where our node servers are listening on
        server 127.0.0.1:3001;
        server 127.0.0.1:3002;
        server 127.0.0.1:3003;

        # Inside Docker we usually DON'T use localhost.
        # Instead, we use the Compose service name : app1:3000 or myServiceName:3000
        
        # Docker provides an internal DNS server, 
        # so service names are automatically resolved to the container's private IP address.
        
        # Example:
        # http://app1:3000 -> resolves -> http://172.x.x.x:3000
        
        # The container IP is assigned dynamically,
        # so always use the service name instead of hardcoding container IP addresses.
     }


    # A virtual server configuration.

    # Defines:
    # - Which port to listen on
    # - Which host/domain should match
    # - How matching requests are handled
    server {

        # Port on which Nginx listens for incoming client connections.
        # Listen on port 443 using SSL/TLS.
        # Port 443 is the standard HTTPS port.
        listen 443 ssl;

        # SSL/TLS is terminated at Nginx.
        # Traffic between the client and Nginx is encrypted.
        # Requests forwarded to the backend may still use HTTP
        # unless HTTPS is configured between Nginx and the backend.
        
        # define which domain to accept such as www.example.com example.com
        server_name localhost;

        # Path to the server's public certificate.
        ssl_certificate     /etc/letsencrypt/live/api.kaif.dev/fullchain.pem;

        # Path to the server's private key.
        ssl_certificate_key /etc/letsencrypt/live/api.kaif.dev/privkey.pem;

        # TLS protocol versions accepted for secure client connections.
        ssl_protocols TLSv1.2 TLSv1.3;

        # In production, SSL certificates are commonly managed automatically by tools such as Certbot,
        # which can also update the Nginx configuration.

        # location means on which path by defualt root path i.e. /
        # you can do location /images {}
        location / {
            # here we can configure nginx to be reverse-proxy/load balancer

            # Forward incoming requests to another backend.
            # Can point to:
            # - a single server
            # - an upstream group

            # Or we can define upstream , we need to explictly define upstream
            proxy_pass http://nodejs_cluster;

            # we can pass the data by setting up proxy header
            # Forward selected client request headers to the backend application.

            # such as Orignal url using Host field and $host varibale
            # In these varibles (ex: $host) nginx has all the configuration of url headers
            # such as Cookies, User-Agent, Authorization
            proxy_set_header Host $host;

            # here are all the example below

            # These headers allow the backend to know information about the original client
            # even though the request first passed through Nginx.
            # Imp info that should always be passed
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;

            # Forward client browser and session information
            proxy_set_header User-Agent $http_user_agent;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Accept-Language $http_accept_language;
            proxy_set_header Referer $http_referer;

            # Forward client's authorization data
            proxy_set_header Authorization $http_authorization;

            # You can also create your own custom headers for backend services if needed.
            proxy_set_header X-Custom-Header "MyAppSpecificValue";
        }
    }

    # Here we define another Server , which is listening on http (port 80)
    # and redirecting to https (443)
    server {
        listen 80;
        server_name localhost;

        location / {
            # Return a permanent redirect (301)
            # telling the client to use HTTPS instead.
            return 301 https://$host$request_uri;
        }
    }
}