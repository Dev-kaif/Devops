name: mySystem

# Include and merge multiple Compose files into a single Compose application
include:
  - ./commons/compose.yaml
  - ./another_domain/compose.yaml

# include:
#    - path: ../another/compose.yaml
#      env_file:
#        - ../another/.env
#        - ../another/dev.env

# Define all application services
services:
  # MongoDB database service
  mongodb-try:
    # Explicit container name
    container_name: mongo

    # Image used to create the container
    image: mongo:latest

    # Map host port 27017 to container port 27017
    ports:
      - "27017:27017"

    # Compose creates a default network automatically
    # Explicit networks allow controlled service communication and isolation
    networks:
      - backend-network

    # Environment variables passed to the MongoDB container
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secret

    # Periodically check whether MongoDB is healthy and ready to respond
    healthcheck:
      # Run this command inside the MongoDB container
      # Exit code 0 = healthy, non-zero = unhealthy
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--username",
          "admin",
          "--password",
          "secret",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping')",
        ]
      interval: 10s # Run the health check every 10 seconds
      timeout: 5s # Fail an individual check if it takes longer than 5 seconds
      retries: 5 # Mark the container unhealthy after 5 consecutive failures
      start_period: 10s # Give MongoDB 10 seconds of startup grace time

    volumes:
      # Persist MongoDB data by mounting the Docker-managed named volume
      # `mongodb-data` at `/data/db` inside the container
      - mongodb-data:/data/db

    # if continer is down for some reasone it will restart it on given contdition
    restart: unless-stopped # no / always / on-failure

  # Web-based MongoDB administration interface
  mongo-express-try:
    container_name: mongo-express
    image: mongo-express:latest
    restart: "no"
    ports:
      - "8081:8081"

    # Inject all variables from `app.env` directly into the container
    # No `environment:` mapping is needed unless you want to add or override values
    env_file:
      - ./app.env

    # Don't need to do this
    # environment:
    #   - ME_CONFIG_MONGODB_URL=mongodb://admin:secret@mongo:27017/?authSource=admin

    networks:
      - backend-network
    # Start this service after the MongoDB service starts
    depends_on:
      # Wait until the MongoDB service becomes healthy
      mongodb-try:
        condition: service_healthy # or service_started

  # Custom application service
  myCustomAppImage:
    container_name: myapp
    
    # Build the image from the Dockerfile in the current directory
    build:
      # Directory used as the Docker build context
      context: .

      # Build only the `service_a` stage from a multi-stage Dockerfile
      # Without `target`, Docker builds the final stage by default
      target: service_a

    restart: on-failure

    networks:
      - backend-network
      - frontend-network

    environment:
      # Resolve values through Compose variable interpolation
      # Compose automatically reads the `.env` file from the project directory
      # and uses its values to replace the referenced `${VARIABLE}` expressions

      # Example `.env` file:
      # MONGO_ADMIN_USERNAME=admin
      # MONGO_ADMIN_PASSWORD=secret

      # The `.env` values are mapped to environment variables
      # with these names inside the container
      MONGO_USERNAME: ${MONGO_ADMIN_USERNAME}
      MONGO_PASSWORD: ${MONGO_ADMIN_PASSWORD}

    # used to run command inside the conatiner
    command: ["echo", "i am here"]

    volumes:
      # Bind mount local source code into the container for development
      # Changes in ./src are reflected inside /app/src

      # Short syntax
      - ./src:/app/src

    # Equivalent long syntax with additional configuration options
    # Useful when you need options such as read_only, consistency, etc.
    # volumes:
    #   - type: bind
    #     source: ./src
    #     target: /app/src
    #     read_only: true

    # annotations used for defining metadata attached to a container or service
    # for external tools and humans to read
    # They do not affect how your application runs.
    # map from
    annotations:
      owner: kaif
      project: notifications-api
      environment: production

    # List form
    # annotations:
    #   - owner=kaif
    #   - team=backend
    #   - project=notifications-api

    # another way of defining dependent
    depends_on:
      - mongodb-try

# Declare Docker-managed named volumes used by services
volumes:
  # Persistent storage used by the MongoDB service
  mongodb-data:
  # Optional explicit configuration:
  # mongodb-data:
  #   driver: local

networks:
  frontend-network:
  backend-network:
